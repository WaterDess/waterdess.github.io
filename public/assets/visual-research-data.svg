      <rect x="172" y="196" width="94" height="9" rx="5" opacity=".62"/>
      <rect x="288" y="196" width="58" height="9" rx="5" opacity=".38"/>
    </g>
  </g>
  <g transform="translate(566 110)" fill="none" stroke="#8aa19b" stroke-width="2">

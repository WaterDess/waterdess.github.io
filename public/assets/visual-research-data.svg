<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Data visual</title>
  <desc id="desc">A minimal data platform visual with databases, tables, raster grids, and metadata records.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#edf6f3"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d9f0ec"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2e6f73" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#dfeae7" stroke-width="1">
    <path d="M80 96h740M80 225h740M80 354h740"/>
    <path d="M180 58v334M350 58v334M520 58v334M690 58v334"/>
  </g>
  <g filter="url(#soft)">
    <rect x="126" y="78" width="648" height="294" rx="12" fill="#ffffff" stroke="#d9e7e3"/>
  </g>
  <g transform="translate(164 118)">

      <rect x="90" y="0" width="76" height="46" rx="5"/>
      <rect x="180" y="0" width="76" height="46" rx="5"/>
      <rect x="270" y="0" width="76" height="46" rx="5"/>
      <rect x="0" y="60" width="76" height="46" rx="5"/>
      <rect x="90" y="60" width="76" height="46" rx="5"/>
      <rect x="180" y="60" width="76" height="46" rx="5"/>
      <rect x="270" y="60" width="76" height="46" rx="5"/>
      <rect x="0" y="120" width="76" height="46" rx="5"/>
      <rect x="90" y="120" width="76" height="46" rx="5"/>
      <rect x="180" y="120" width="76" height="46" rx="5"/>
      <rect x="270" y="120" width="76" height="46" rx="5"/>
    </g>
    <g fill="#8aa19b">

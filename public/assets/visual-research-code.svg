<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-labelledby="title desc">
  <title id="title">Code visual</title>
  <desc id="desc">A minimal code editor and software modules for hydrological modeling tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfa"/>
      <stop offset="1" stop-color="#edf6f3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#2e6f73" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="900" height="450" fill="url(#bg)"/>
  <g fill="none" stroke="#dfeae7" stroke-width="1">
    <path d="M80 96h740M80 225h740M80 354h740"/>
    <path d="M180 58v334M350 58v334M520 58v334M690 58v334"/>
  </g>
  <g filter="url(#soft)">
    <rect x="126" y="76" width="648" height="298" rx="12" fill="#ffffff" stroke="#d9e7e3"/>
  </g>
  <g fill="#eff7f4">
    <rect x="126" y="76" width="648" height="50" rx="12"/>
    <rect x="126" y="112" width="648" height="14"/>
  </g>
  <g fill="#8aa19b">
    <circle cx="162" cy="101" r="6"/>
    <circle cx="184" cy="101" r="6"/>
    <circle cx="206" cy="101" r="6"/>
  </g>
  <path d="M292 126v248" fill="none" stroke="#d9e7e3" stroke-width="2"/>
  <g font-family="Consolas, Menlo, monospace" font-size="20" font-weight="700">
    <text x="154" y="168" fill="#90a39e">01</text>
    <text x="154" y="206" fill="#90a39e">02</text>
    <text x="154" y="244" fill="#90a39e">03</text>
    <text x="154" y="282" fill="#90a39e">04</text>
    <text x="198" y="168" fill="#233532">import hydro</text>
    <text x="198" y="206" fill="#2e6f73">basin = load()</text>
    <text x="198" y="244" fill="#667873">model.fit(x, y)</text>
    <text x="198" y="282" fill="#9a7a35">forecast.run()</text>
  </g>
  <g transform="translate(342 158)">
    <g fill="#ffffff" stroke="#d9e7e3" stroke-width="2">
      <rect x="0" y="0" width="170" height="70" rx="9"/>
      <rect x="208" y="0" width="170" height="70" rx="9"/>
      <rect x="104" y="112" width="170" height="70" rx="9"/>
    </g>
    <g fill="#233532" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-weight="760">
      <text x="27" y="42" font-size="22">model.py</text>
      <text x="235" y="42" font-size="22">utils</text>
      <text x="134" y="154" font-size="22">tests</text>
    </g>
    <g fill="none" stroke="#8ac8c0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M170 35h38"/>
      <path d="M248 70v42"/>
      <path d="M188 112v-42"/>

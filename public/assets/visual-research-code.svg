    <g fill="#d7eee9">
      <rect x="27" y="50" width="90" height="8" rx="4"/>
      <rect x="235" y="50" width="66" height="8" rx="4"/>
      <rect x="134" y="162" width="72" height="8" rx="4"/>
    </g>
  </g>

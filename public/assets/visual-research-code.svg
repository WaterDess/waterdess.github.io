<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Code visual</title>
  <desc id="desc">Minimal hydrological modeling code interface with structured modules and a simulated river curve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071112"/>
      <stop offset="1" stop-color="#132b2c"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#9ddfd7"/>
      <stop offset="1" stop-color="#f1d18a"/>
    </linearGradient>
  </defs>
  <rect width="900" height="560" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="1">
    <path d="M80 112h740M80 224h740M80 336h740M80 448h740"/>
    <path d="M196 72v416M312 72v416M428 72v416M544 72v416M660 72v416"/>
  </g>
  <rect x="96" y="88" width="708" height="384" rx="8" fill="#0c191a" stroke="#31504f" stroke-opacity=".65"/>
  <g fill="#b9ccc7" opacity=".82" font-family="Consolas, Menlo, monospace" font-size="25" font-weight="600">
    <text x="144" y="154">model.run( basin, forcing )</text>
    <text x="144" y="206">calibrate → route → forecast</text>
    <text x="144" y="258">return discharge, risk, state</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M146 368c74-48 126-40 184-89 54-45 102-45 160-15 62 32 126 20 204-42" stroke="url(#line)" stroke-width="7"/>
    <path d="M330 279c34 29 59 64 73 108M490 264c32 41 66 68 115 82" stroke="#82c9c0" stroke-width="4" opacity=".76"/>
  </g>
  <g fill="#f1d18a">
    <circle cx="330" cy="279" r="9"/>
    <circle cx="490" cy="264" r="9"/>
    <circle cx="403" cy="387" r="7"/>
  </g>
  <g fill="#f7fbf8" opacity=".88">
    <rect x="626" y="132" width="116" height="14" rx="7"/>
    <rect x="626" y="166" width="82" height="10" rx="5" opacity=".55"/>
    <rect x="626" y="190" width="128" height="10" rx="5" opacity=".35"/>
  </g>
</svg>

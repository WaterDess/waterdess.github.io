<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo Options | Global Change Hydrology Group</title>
    <link rel="stylesheet" href="./styles.css?v=people-scholar-glow-1" />
    <link rel="icon" href="./public/assets/favicon.svg" type="image/svg+xml" />
    <style>
      body {
        background: #f5f9f7;
      }

      .logo-options-page {
        width: min(100% - 2rem, 1200px);
        margin: 0 auto;
        padding: 2.5rem 0 4rem;
      }

      .logo-options-page h1 {
        margin: 0 0 0.4rem;
        font-size: clamp(1.6rem, 2.6vw, 2.4rem);

      .logo-options-page p {
        margin: 0 0 1.4rem;
        color: var(--muted);
        font-size: 0.86rem;

      .logo-options-page img {

        border: 1px solid var(--border);
        border-radius: 8px;
        background: #f5f9f7;
      }

  <body>
    <main class="logo-options-page">
